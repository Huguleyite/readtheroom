<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Read the Room — Issue #10 Thumbnail</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&family=Source+Serif+4:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #111110;
    font-family: 'DM Sans', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .thumb {
    width: 1200px;
    height: 630px;
    background: #111110;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 72px 88px;
    overflow: hidden;
  }

  /* Waveform decoration */
  .waveform {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 120px;
    display: flex;
    align-items: flex-end;
    gap: 5px;
    padding: 0 88px;
    opacity: 0.12;
  }
  .wave-bar {
    background: #c8a96e;
    border-radius: 2px 2px 0 0;
    flex: 1;
  }

  /* Grid overlay */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 62px, rgba(200,169,110,0.03) 62px, rgba(200,169,110,0.03) 63px),
      repeating-linear-gradient(90deg, transparent, transparent 62px, rgba(200,169,110,0.03) 62px, rgba(200,169,110,0.03) 63px);
    pointer-events: none;
  }

  /* Top accent */
  .top-rule {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: #c8a96e;
  }

  /* Content */
  .content { position: relative; z-index: 2; }

  .eyebrow {
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: #c8a96e;
    font-weight: 500;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .eyebrow-rule {
    display: inline-block;
    width: 40px;
    height: 1px;
    background: #c8a96e;
  }

  .issue-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 108px;
    font-weight: 900;
    color: #faf9f5;
    letter-spacing: 0.02em;
    line-height: 0.9;
    margin-bottom: 32px;
    -webkit-text-stroke: 1px rgba(200,169,110,0.4);
  }

  .subtitle {
    font-family: 'Source Serif 4', Georgia, serif;
    font-style: italic;
    font-weight: 300;
    font-size: 22px;
    color: #888880;
    letter-spacing: 0.04em;
    line-height: 1.5;
    max-width: 700px;
    margin-bottom: 48px;
  }

  .meta-row {
    display: flex;
    align-items: center;
    gap: 20px;
  }
  .meta-brand {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555550;
    font-weight: 500;
  }
  .meta-dot { color: #c8a96e; }
  .meta-issue {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #555550;
  }
  .meta-date {
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #3a3a38;
  }

  /* Right side decoration */
  .side-deco {
    position: absolute;
    right: 88px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    text-align: center;
  }
  .side-issue-num {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 180px;
    font-weight: 900;
    color: rgba(200,169,110,0.06);
    line-height: 1;
    letter-spacing: -0.02em;
    user-select: none;
  }
</style>
</head>
<body>
<div class="thumb">
  <div class="top-rule"></div>
  <div class="grid-overlay"></div>

  <!-- Waveform bars -->
  <div class="waveform">
    <div class="wave-bar" style="height:30%"></div>
    <div class="wave-bar" style="height:55%"></div>
    <div class="wave-bar" style="height:40%"></div>
    <div class="wave-bar" style="height:75%"></div>
    <div class="wave-bar" style="height:50%"></div>
    <div class="wave-bar" style="height:90%"></div>
    <div class="wave-bar" style="height:65%"></div>
    <div class="wave-bar" style="height:45%"></div>
    <div class="wave-bar" style="height:80%"></div>
    <div class="wave-bar" style="height:35%"></div>
    <div class="wave-bar" style="height:60%"></div>
    <div class="wave-bar" style="height:85%"></div>
    <div class="wave-bar" style="height:50%"></div>
    <div class="wave-bar" style="height:70%"></div>
    <div class="wave-bar" style="height:40%"></div>
    <div class="wave-bar" style="height:95%"></div>
    <div class="wave-bar" style="height:55%"></div>
    <div class="wave-bar" style="height:65%"></div>
    <div class="wave-bar" style="height:30%"></div>
    <div class="wave-bar" style="height:75%"></div>
    <div class="wave-bar" style="height:45%"></div>
    <div class="wave-bar" style="height:60%"></div>
    <div class="wave-bar" style="height:85%"></div>
    <div class="wave-bar" style="height:40%"></div>
    <div class="wave-bar" style="height:70%"></div>
    <div class="wave-bar" style="height:55%"></div>
    <div class="wave-bar" style="height:35%"></div>
    <div class="wave-bar" style="height:80%"></div>
    <div class="wave-bar" style="height:50%"></div>
    <div class="wave-bar" style="height:65%"></div>
  </div>

  <!-- Ghost issue number -->
  <div class="side-deco">
    <div class="side-issue-num">10</div>
  </div>

  <!-- Main content -->
  <div class="content">
    <div class="eyebrow">
      <span class="eyebrow-rule"></span>
      Read the Room &nbsp;&middot;&nbsp; Issue #10
    </div>

    <div class="issue-title">Face Value</div>

    <div class="subtitle">
      A $250 bill. A sitting president's face. A law from 1866.<br>
      And a question about what currency is actually for.
    </div>

    <div class="meta-row">
      <span class="meta-brand">readtheroom.news</span>
      <span class="meta-dot">◆</span>
      <span class="meta-issue">The $250 Bill</span>
      <span class="meta-dot">◆</span>
      <span class="meta-date">June 9, 2026</span>
    </div>
  </div>

</div>
</body>
</html>
